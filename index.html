<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c4643a">
<link rel="manifest" href="./manifest.json">
<title>中国語ノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f3ec;
    --card-bg: #fffdf7;
    --text-cn: #2c2c2c;
    --text-pinyin: #b07a4a;
    --text-jp: #6b6b6b;
    --accent: #c4643a;
    --accent-light: #f0d8c8;
    --accent-faint: #faf0e8;
    --border: #e6ddd0;
    --shadow: rgba(180, 160, 130, 0.12);
    --note-grammar: #c4643a;
    --note-usage: #7a8f4a;
    --note-compare: #5a7ab0;
    --note-tip: #b08a3a;
    --note-vocab: #8a6aaa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text-cn);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 0;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ─── */
  .header {
    background: linear-gradient(135deg, #c4643a 0%, #a8522e 100%);
    padding: 32px 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(160, 80, 40, 0.25);
  }

  .header h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 30px;
    color: #fffdf7;
    letter-spacing: 6px;
    font-weight: 400;
  }

  .header .subtitle {
    font-size: 11px;
    color: rgba(255, 253, 247, 0.65);
    margin-top: 5px;
    font-weight: 300;
    letter-spacing: 1.5px;
  }

  .header .stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 12px;
  }

  .header .stat {
    font-size: 10px;
    color: rgba(255, 253, 247, 0.55);
    font-weight: 300;
  }

  .header .stat strong {
    color: rgba(255, 253, 247, 0.85);
    font-weight: 500;
    font-size: 14px;
    display: block;
    margin-bottom: 1px;
  }

  /* ─── Cards ─── */
  .cards {
    padding: 16px 12px 100px;
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 20px 16px 14px;
    box-shadow: 0 1px 8px var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    animation: fadeIn 0.35s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Number badge ─── */
  .card-num {
    position: absolute;
    top: -1px;
    left: 16px;
    background: var(--accent);
    color: #fffdf7;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 11px 4px;
    border-radius: 0 0 7px 7px;
    letter-spacing: 0.5px;
  }

  /* ─── Pinyin ─── */
  .pinyin {
    font-size: 13px;
    color: var(--text-pinyin);
    margin-bottom: 3px;
    margin-top: 10px;
    font-weight: 400;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }

  /* ─── Chinese ─── */
  .chinese {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--text-cn);
    line-height: 1.6;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  /* ─── Divider ─── */
  .divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* ─── Japanese ─── */
  .japanese {
    font-size: 13px;
    color: var(--text-jp);
    line-height: 1.7;
    font-weight: 300;
  }

  /* ─── Audio + Notes toggle row ─── */
  .action-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }

  .notes-toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 5px 12px;
    cursor: pointer;
    color: var(--text-jp);
    font-size: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
    transition: all 0.2s ease;
  }

  .notes-toggle:hover, .notes-toggle.active {
    background: var(--accent-faint);
    border-color: var(--accent-light);
    color: var(--accent);
  }

  .notes-toggle svg {
    width: 12px;
    height: 12px;
    transition: transform 0.25s ease;
  }

  .notes-toggle.active svg {
    transform: rotate(180deg);
  }

  .audio-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--accent-light);
    border: none;
    border-radius: 20px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--accent);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
  }

  .audio-btn:active, .audio-btn.playing {
    background: var(--accent);
    color: white;
    transform: scale(0.95);
  }

  .audio-btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* ─── Notes section ─── */
  .notes-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, margin-top 0.35s ease;
    margin-top: 0;
  }

  .notes-panel.open {
    max-height: 600px;
    margin-top: 12px;
  }

  .note-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #f0ebe3;
  }

  .note-item:last-child { border-bottom: none; }

  .note-badge {
    flex-shrink: 0;
    font-size: 9px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    margin-top: 2px;
    white-space: nowrap;
    height: fit-content;
  }

  .note-badge.grammar { background: #fae8e2; color: var(--note-grammar); }
  .note-badge.usage   { background: #e8f0da; color: var(--note-usage); }
  .note-badge.compare  { background: #dfe8f5; color: var(--note-compare); }
  .note-badge.tip      { background: #f5edda; color: var(--note-tip); }
  .note-badge.vocab    { background: #eee4f5; color: var(--note-vocab); }

  .note-body { flex: 1; min-width: 0; }

  .note-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-cn);
    margin-bottom: 2px;
    font-family: 'Noto Sans SC', 'Noto Sans JP', sans-serif;
  }

  .note-text {
    font-size: 12px;
    color: var(--text-jp);
    line-height: 1.7;
    font-weight: 300;
  }

  /* ─── Lesson label ─── */
  .lesson-label {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    padding: 10px 4px 2px;
    letter-spacing: 1.5px;
  }

  /* ─── Footer ─── */
  .footer {
    text-align: center;
    padding: 24px 20px;
    font-size: 11px;
    color: #b0a898;
    font-weight: 300;
    line-height: 1.8;
  }

  /* ─── Responsive ─── */
  @media (max-width: 400px) {
    .chinese { font-size: 17px; }
    .cards { padding: 12px 8px 100px; }
    .card { padding: 18px 14px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>中国語ノート</h1>
  <div class="subtitle">覚えたい表現コレクション</div>
  <div class="stats">
    <div class="stat"><strong id="total-count">-</strong>例文</div>
    <div class="stat"><strong id="lesson-count">-</strong>課</div>
    <div class="stat"><strong id="update-date">-</strong>更新</div>
  </div>
</div>

<div class="cards" id="cards"></div>

<script>
// ─── Audio ───
function speak(text, btn) {
  window.speechSynthesis.cancel();
  document.querySelectorAll('.audio-btn').forEach(b => b.classList.remove('playing'));
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utter.voice = zhVoice;
  btn.classList.add('playing');
  utter.onend = () => btn.classList.remove('playing');
  utter.onerror = () => btn.classList.remove('playing');
  window.speechSynthesis.speak(utter);
}

// ─── Toggle notes ───
function toggleNotes(id) {
  const panel = document.getElementById('notes-' + id);
  const btn = document.getElementById('toggle-' + id);
  panel.classList.toggle('open');
  btn.classList.toggle('active');
}

// ─── Note type labels ───
const noteTypeLabels = {
  grammar: '文法',
  usage: '使い方',
  compare: '比較',
  tip: 'ポイント',
  vocab: '語彙'
};

// ─── Render ───
async function render() {
  let sentences;
  try {
    const res = await fetch('./sentences.json');
    sentences = await res.json();
  } catch (e) {
    document.getElementById('cards').innerHTML = '<div style="text-align:center;padding:40px;color:#999;">データの読み込みに失敗しました</div>';
    return;
  }

  // Stats
  const lessons = new Set(sentences.map(s => s.lesson));
  document.getElementById('total-count').textContent = sentences.length;
  document.getElementById('lesson-count').textContent = lessons.size;
  document.getElementById('update-date').textContent = new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });

  const container = document.getElementById('cards');
  let html = '';
  let currentLesson = -1;

  sentences.forEach((s, i) => {
    if (s.lesson !== currentLesson) {
      currentLesson = s.lesson;
      html += `<div class="lesson-label">第${s.lesson}课</div>`;
    }

    const escapedChinese = s.chinese.replace(/'/g, "\\'");

    // Build notes HTML
    let notesHtml = '';
    if (s.notes && s.notes.length > 0) {
      notesHtml = s.notes.map(n => `
        <div class="note-item">
          <span class="note-badge ${n.type}">${noteTypeLabels[n.type] || n.type}</span>
          <div class="note-body">
            <div class="note-label">${n.label}</div>
            <div class="note-text">${n.text}</div>
          </div>
        </div>
      `).join('');
    }

    html += `
      <div class="card" style="animation-delay:${i * 0.02}s">
        <div class="card-num">${s.id}</div>
        <div class="pinyin">${s.pinyin}</div>
        <div class="chinese">${s.chinese}</div>
        <div class="divider"></div>
        <div class="japanese">${s.japanese}</div>
        <div class="action-row">
          ${s.notes && s.notes.length > 0 ? `
          <button class="notes-toggle" id="toggle-${s.id}" onclick="toggleNotes(${s.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            解説 ${s.notes.length}件
          </button>` : '<div></div>'}
          <button class="audio-btn" onclick="speak('${escapedChinese}', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            再生
          </button>
        </div>
        ${s.notes && s.notes.length > 0 ? `<div class="notes-panel" id="notes-${s.id}">${notesHtml}</div>` : ''}
      </div>
    `;
  });

  html += `<div class="footer">${sentences.length} 個の例文 ・ ${lessons.size} 課<br>最終更新: ${new Date().toLocaleDateString('ja-JP')}</div>`;
  container.innerHTML = html;
}

// ─── Init ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => {};
}
render();
</script>

</body>
</html>
